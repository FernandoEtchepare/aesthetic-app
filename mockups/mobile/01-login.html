<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — Login (Mobile)</title>
<link rel="stylesheet" href="../assets/design-system.css">
<style>
.screen-inner {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 28px 48px;
  gap: 24px;
  background: var(--black);
}

.login-logo {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(201,168,76,0.15);
  margin-bottom: 8px;
  overflow: hidden;
}

.login-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

.login-heading {
  text-align: center;
}

.login-heading h1 {
  font-family: var(--font-display);
  font-size: 1.9rem;
  font-weight: 300;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 6px;
}

.login-heading h1 em { font-style: italic; color: var(--gold); }

.login-heading p {
  font-size: 0.65rem;
  font-weight: 300;
  letter-spacing: 0.1em;
  color: var(--white-faint);
}

.form-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.input-row {
  position: relative;
}

.input-row .input-icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.8rem;
  color: var(--white-faint);
  pointer-events: none;
}

.forgot {
  text-align: right;
  font-size: 0.6rem;
  color: var(--gold);
  letter-spacing: 0.05em;
  margin-top: -6px;
}

.social-btns {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.register-link {
  text-align: center;
  font-size: 0.62rem;
  color: var(--white-faint);
  letter-spacing: 0.05em;
}

.register-link a {
  color: var(--gold);
  font-weight: 600;
}

.noise-bg {
  position: absolute;
  inset: 0;
  opacity: 0.02;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
}

.gold-glow-bg {
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.05) 0%, transparent 70%);
  top: -80px; left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
}
</style>
</head>
<body>
<div class="mockup-label">01 — Login · Mobile · 390×844</div>
<div class="phone-frame">
  <div class="dynamic-island"></div>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <span>▲▲▲</span>
      <span>WiFi</span>
      <span>🔋</span>
    </div>
  </div>
  <div class="screen">
    <div class="screen-inner">
      <div class="noise-bg"></div>
      <div class="gold-glow-bg"></div>

      <div class="login-logo">
        <img src="../assets/logo-circulo.png" alt="Aesthetic Gym">
      </div>

      <div class="login-heading">
        <h1>Bienvenido<br>de <em>vuelta</em></h1>
        <p>Ingresá a tu cuenta para continuar</p>
      </div>

      <div class="form-area">
        <div class="input-group">
          <label>Email</label>
          <div class="input-row">
            <input type="email" placeholder="tu@email.com" value="fernando@email.com">
            <span class="input-icon">✉</span>
          </div>
        </div>
        <div class="input-group">
          <label>Contraseña</label>
          <div class="input-row">
            <input type="password" placeholder="••••••••" value="password">
            <span class="input-icon">👁</span>
          </div>
        </div>
        <div class="forgot">¿Olvidaste tu contraseña?</div>
        <button class="btn-gold">Iniciar sesión</button>
      </div>

      <div class="or-divider" style="width:100%">o continuá con</div>

      <div class="social-btns">
        <button class="btn-outline">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
            <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
            <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
            <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
          </svg>
          Continuar con Google
        </button>
        <button class="btn-outline">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
            <path d="M12.7 0c.07.97-.28 1.94-.85 2.66-.57.72-1.46 1.28-2.35 1.21-.1-.9.3-1.84.84-2.5C10.9.67 11.84.1 12.7 0zm3.3 13.27c-.5.97-1.05 1.9-1.85 2.74-.77.8-1.57 1.35-2.5 1.35-.9 0-1.5-.5-2.38-.5-.92 0-1.6.5-2.45.5-.9 0-1.73-.57-2.5-1.4C2.1 14.6.9 12.3.9 10.07c0-3.8 2.46-5.8 4.9-5.8 1 0 1.85.56 2.5.56.6 0 1.55-.6 2.7-.6 1.1 0 2.8.6 3.8 2.2-.1.07-2.3 1.33-2.3 3.97 0 3.1 2.7 4.14 2.5 4.87z"/>
          </svg>
          Continuar con Apple
        </button>
      </div>

      <div class="register-link">
        ¿No tenés cuenta? <a>Registrate</a>
      </div>
    </div>
  </div>
</div>
</body>
</html>
