<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mockup — Perfil Light (Mobile)</title>
<link rel="stylesheet" href="../assets/design-system.css">
<style>
/* ── LIGHT THEME OVERRIDES ── */
:root {
  --l-bg:        #f0ebe2;
  --l-surface:   #faf7f2;
  --l-card:      #ffffff;
  --l-input:     #f5f1ea;
  --l-border:    rgba(0,0,0,0.07);
  --l-text:      #1a1a17;
  --l-text-dim:  rgba(26,26,23,0.55);
  --l-text-faint:rgba(26,26,23,0.35);
  --l-gold:      #9a7a2e;
  --l-gold-pale: rgba(154,122,46,0.1);
  --l-gold-glow: rgba(154,122,46,0.2);
  --l-sidebar:   #e8e2d8;
}

/* ── MOCKUP CANVAS ── */
body { background: #ddd8cf; }

/* ── PHONE FRAME ── */
.phone-frame { background: var(--l-bg); }
.dynamic-island { background: #1a1a17 !important; }
.status-bar { background: var(--l-bg) !important; color: var(--l-text) !important; border-bottom: 1px solid var(--l-border); }
.status-bar .time { color: var(--l-text) !important; }

/* ── SCREEN ── */
.screen { background: var(--l-bg) !important; display: flex !important; flex-direction: column !important; overflow: hidden !important; }
.screen-inner { flex: 1; min-height: 0; background: var(--l-bg); overflow-y: auto; overflow-x: hidden; scrollbar-width: none; padding-bottom: calc(var(--bottom-nav) + 16px); }
.screen-inner::-webkit-scrollbar { display: none; }

/* ── BOTTOM NAV ── */
.bottom-nav { background: var(--l-surface) !important; border-top: 1px solid var(--l-border) !important; }
.nav-item .nav-text { color: var(--l-text-faint) !important; }
.nav-item .nav-icon svg { color: var(--l-text-faint) !important; }
.nav-item.active .nav-text { color: var(--l-gold) !important; }
.nav-item.active .nav-icon svg { color: var(--l-gold) !important; }

/* ── PROFILE HERO ── */
.profile-hero {
  background: linear-gradient(160deg, #ede4d0 0%, #f5f1e8 100%);
  border-bottom: 1px solid var(--l-border);
  padding: 24px 20px 28px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.profile-hero::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(154,122,46,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.profile-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.screen-title { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; color: var(--l-gold); }

.big-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, #ede4d0, #e8dfc8);
  border: 2px solid rgba(154,122,46,0.4);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: 1.8rem; color: var(--l-gold);
  position: relative; flex-shrink: 0;
  box-shadow: 0 0 20px rgba(154,122,46,0.12);
}
.avatar-edit {
  position: absolute; bottom: 0; right: 0;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--l-gold); display: flex; align-items: center; justify-content: center;
  font-size: 0.55rem; color: #fff; border: 2px solid var(--l-surface);
}
.profile-avatar-area { display: flex; align-items: center; gap: 16px; }
.profile-info .name { font-family: var(--font-display); font-size: 1.4rem; font-weight: 400; color: var(--l-text); margin-bottom: 3px; }
.profile-info .email { font-size: 0.62rem; color: var(--l-text-dim); margin-bottom: 8px; }
.member-since { display: flex; align-items: center; gap: 6px; font-size: 0.55rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--l-gold); }

/* ── STATS ── */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 2px; margin: 16px 0 0; }
.stat-box { background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.06); border-radius: 10px; padding: 12px 8px; text-align: center; }
.stat-box .stat-val { font-family: var(--font-display); font-size: 1.5rem; font-weight: 400; color: var(--l-gold); display: block; line-height: 1; margin-bottom: 4px; }
.stat-box .stat-lbl { font-size: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--l-text-faint); }

/* ── FORM SECTIONS ── */
.form-section { padding: 20px 20px 0; }
.form-section-title {
  font-size: 0.58rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--l-gold); margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.form-section-title::after { content: ''; flex: 1; height: 1px; background: rgba(154,122,46,0.2); }
.fields { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.input-row-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.save-btn-area { padding: 0 20px 20px; }

/* ── THEME TOGGLE ── */
.theme-toggle {
  display: inline-flex; align-items: center;
  background: rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.1);
  border-radius: 20px; padding: 3px 5px; gap: 2px;
  text-decoration: none;
}
.theme-toggle span {
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; font-size: 0.7rem;
}
.theme-toggle .tt-active { background: rgba(0,0,0,0.1); }

/* ── INPUTS ── */
.input-group label { color: var(--l-text-faint) !important; }
input, select, textarea {
  background: var(--l-input) !important;
  border-color: var(--l-border) !important;
  color: var(--l-text) !important;
}
input::placeholder { color: var(--l-text-faint) !important; }

/* ── MEMBERSHIP CARD ── */
.membership-card {
  margin: 0 20px;
  background: linear-gradient(135deg, #ede4d0, #f5f1e8);
  border: 1px solid rgba(154,122,46,0.3);
  border-radius: 14px; padding: 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.mem-info .mem-tier { font-size: 0.52rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--l-gold); margin-bottom: 3px; }
.mem-info .mem-name { font-family: var(--font-display); font-size: 1.2rem; font-weight: 400; color: var(--l-text); }
.mem-info .mem-exp { font-size: 0.55rem; color: var(--l-text-dim); margin-top: 2px; }
.mem-icon { font-size: 1.6rem; opacity: 0.5; }

/* ── GOLD BUTTON ── */
.btn-gold { background: var(--l-gold) !important; color: #fff !important; }

/* ── REAL DEVICE ── */
@media (max-width: 480px) {
  html, body { height: auto !important; overflow-x: hidden !important; }
  body { display: block !important; }
  .mockup-label { display: none !important; }
  .dynamic-island { display: none !important; }
  .status-bar { display: none !important; }
  .phone-frame { width: 100% !important; height: auto !important; min-height: 100dvh !important; border-radius: 0 !important; border: none !important; box-shadow: none !important; overflow: visible !important; position: static !important; }
  .screen { display: block !important; height: auto !important; overflow: visible !important; position: static !important; }
  .screen-inner { overflow: visible !important; height: auto !important; padding-bottom: calc(var(--bottom-nav) + 60px) !important; }
  .bottom-nav { position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; height: auto !important; padding-bottom: max(env(safe-area-inset-bottom), 8px) !important; }
}
</style>
</head>
