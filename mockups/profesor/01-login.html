<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mockup — Login Profesor (Mobile)</title>
<link rel="stylesheet" href="../assets/design-system.css">
<style>
.screen-inner {
  min-height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: calc(var(--status-bar) + 4px) 28px 48px;
  gap: 24px;
  background: var(--black);
  position: relative;
}

.login-logo {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  box-shadow: 0 0 40px rgba(201,168,76,0.15);
  margin-bottom: 4px;
  overflow: hidden;
  position: relative;
}

.login-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

.profesor-badge {
  background: rgba(201,168,76,0.1);
  border: 1px solid rgba(201,168,76,0.3);
  color: var(--gold);
  letter-spacing: 0.3em;
  font-size: 0.5rem;
  font-family: var(--font-body);
  font-weight: 600;
  border-radius: 20px;
  padding: 4px 12px;
  text-transform: uppercase;
  margin-top: -8px;
}

.login-heading {
  text-align: center;
}

.login-heading h1 {
  font-family: var(--font-display);
  font-size: 1.9rem;
  font-weight: 300;
  color: var(--white);
  line-height: 1.1;
  margin-bottom: 6px;
}

.login-heading h1 em { font-style: italic; color: var(--gold); }

.login-heading p {
  font-size: 0.65rem;
  font-weight: 300;
  letter-spacing: 0.1em;
  color: var(--white-faint);
}

.form-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.input-row {
  position: relative;
}

.input-row .input-icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 0.8rem;
  color: var(--white-faint);
  pointer-events: none;
}

.forgot {
  text-align: right;
  font-size: 0.6rem;
  color: var(--gold);
  letter-spacing: 0.05em;
  margin-top: -6px;
}

.noise-bg {
  position: absolute;
  inset: 0;
  opacity: 0.02;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
}

.gold-glow-bg {
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.05) 0%, transparent 70%);
  top: -80px; left: 50%;
  transform: translateX(-50%);
  pointer-events: none;
}

.logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
</style>
</head>
<body>
<div class="mockup-label">01 — Login Profesor · Mobile · 390×844</div>
<div class="phone-frame">
  <div class="dynamic-island"></div>
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <span>▲▲▲</span>
      <span>WiFi</span>
      <span>🔋</span>
    </div>
  </div>
  <div class="screen">
    <div class="screen-inner">
      <div class="noise-bg"></div>
      <div class="gold-glow-bg"></div>

      <div class="logo-wrap">
        <div class="login-logo">
          <img src="../assets/logo-circulo.png" alt="Aesthetic Gym">
        </div>
        <span class="profesor-badge">Profesor</span>
      </div>

      <div class="login-heading">
        <h1>Bienvenido,<br><em>profesor</em></h1>
        <p>Accedé a tu panel de gestión</p>
      </div>

      <div class="form-area">
        <div class="input-group">
          <label>Email</label>
          <div class="input-row">
            <input type="email" placeholder="tu@email.com" value="carlos@aesthetic.gym">
          </div>
        </div>
        <div class="input-group">
          <label>Contraseña</label>
          <div class="input-row">
            <input type="password" placeholder="••••••••" value="password">
            <span class="input-icon">👁</span>
          </div>
        </div>
        <div class="forgot">¿Olvidaste tu contraseña?</div>
        <a href="02-inicio.html" style="text-decoration:none;display:block;"><button class="btn-gold">Iniciar sesión</button></a>
      </div>

    </div>
  </div>
</div>
</body>
</html>
